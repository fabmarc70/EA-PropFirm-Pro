<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#050300" />
    <meta name="description" content="Simulateur EA pour challenges FundedNext - règles Stellar 2026" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PropFirm Pro" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <title>EA PropFirm Pro</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: #050300;
        color: #FFFFFF;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        /* Police système iOS — identique à Capital.com */
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
        -webkit-font-smoothing: antialiased;
        font-size: 15px;
        line-height: 1.5;
      }
      #root {
        min-height: 100vh;
        min-height: -webkit-fill-available;
        background: #050300;
      }
      /* Scrollbar discrète */
      ::-webkit-scrollbar { width: 2px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
