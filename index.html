<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#080810" />
    <meta name="description" content="Simulateur EA pour challenges FundedNext - règles Stellar 2026" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PropFirm Pro" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <title>EA PropFirm Pro</title>
    <!-- Polices premium : Playfair Display (titres) + DM Sans (corps) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: #080400;
        color: #F0E4C8;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        font-family: 'DM Sans', -apple-system, sans-serif;
      }
      #root {
        min-height: 100vh;
        min-height: -webkit-fill-available;
        background: #080400;
      }
      /* Scrollbar dorée */
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(201,146,42,0.3); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
